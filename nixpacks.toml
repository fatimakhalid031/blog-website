[phases.setup]
nixPkgs = ["php84", "nodejs_22", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "php artisan storage:link --force && php artisan migrate --force && php artisan db:seed --force && LOG_CHANNEL=stderr php artisan serve --host=0.0.0.0 --port=$PORT"
